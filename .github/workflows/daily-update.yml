name: Update Daily Commit Dashboard

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Run Dashboard Generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TZ: "Asia/Seoul"
        run: python update_dashboard.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md
          # 푸시하기 전에 최신 커밋을 rebase로 당겨온 뒤 안전하게 push
          git diff --quiet && git diff --staged --quiet || (git pull --rebase origin main && git push origin main)
